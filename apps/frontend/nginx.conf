server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Match backend bodyLimit + Caddy request_body max_size
    client_max_body_size 11M;

    # ── Security headers ──
    # ⛔ FATAL: DO NOT use this nginx profile in production with CSP enabled below.
    # The default production path (Caddy → Backend) provides proper per-request
    # nonce-based CSP with zero 'unsafe-inline'. This nginx profile is a dev
    # convenience only. If you must use nginx in production, set up nginx-sxg
    # or a nonce-injection module — do NOT uncomment the CSP below unchanged.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Health check endpoint
    location /health {
        return 200 'OK';
    }

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
              text/xml application/xml application/xml+rss text/javascript;

    # ── Static assets (immutable, long cache) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA routing ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ──
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket proxy ──
    location /ws-server/ {
        proxy_pass http://ws-server:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
