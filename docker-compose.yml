services:
  postgres:
    image: postgres:16
    container_name: collab_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collab_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: collab_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: collab_rustfs
    ports:
      - '9000:9000'
    environment:
      RUSTFS_USER: rustfsadmin
      RUSTFS_PASSWORD: rustfsadmin
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/health || exit 1']
      interval: 10s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
